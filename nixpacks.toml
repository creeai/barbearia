# Configuração do Nixpacks para EasyPanel
# Evita Corepack no build para contornar erro de assinatura (keyid)

[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.32.0 && export PATH=\"$(npm prefix -g)/bin:$PATH\"",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"
